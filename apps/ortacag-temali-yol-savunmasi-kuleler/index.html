<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ortaçağ Savunması</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; background-color: #34495e; }
        .buy-tower-btn.selected { @apply ring-4 ring-yellow-400; }
        .tooltip { visibility: hidden; width: 120px; background-color: rgba(0,0,0,0.7); color: #fff; text-align: center; border-radius: 6px; padding: 5px 0; position: absolute; z-index: 20; bottom: 125%; left: 50%; margin-left: -60px; opacity: 0; transition: opacity 0.3s; }
        .buy-tower-btn:hover .tooltip { visibility: visible; opacity: 1; }
        .tooltip::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: rgba(0,0,0,0.7) transparent transparent transparent; }
    </style>
</head>
<body>
    <div id="gameContainer" class="relative w-full h-screen overflow-hidden flex items-center justify-center bg-gray-900">
        <canvas id="gameCanvas" class="bg-gray-800 block"></canvas>

        <div id="menuOverlay" class="absolute inset-0 bg-black bg-opacity-75 flex items-center justify-center text-white p-4 z-10">
            <div class="text-center">
                <h1 id="menuTitle" class="text-5xl font-bold mb-6">Ortaçağ Savunması</h1>
                <p id="menuMessage" class="text-2xl mb-8">Kuleleri yerleştir, düşmanları durdur!</p>
                <button id="baslaBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-xl transition duration-300">Oyunu Başlat</button>
            </div>
        </div>

        <div id="gameUI" class="absolute top-4 left-4 right-4 flex justify-between items-center text-white text-lg p-3 bg-black bg-opacity-50 rounded-lg z-10 hidden">
            <div class="flex flex-col items-start space-y-1">
                <p>Can: <span id="uiHealth">100</span></p>
                <p>Skor: <span id="uiScore">0</span></p>
            </div>
            <div class="flex flex-col items-end space-y-1">
                <p>Para: <span id="uiMoney">100</span></p>
                <p>Dalga: <span id="uiWave">1</span></p>
            </div>
            <div class="flex space-x-2">
                <button id="buyTower1" class="buy-tower-btn relative bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                    Okçu (50)
                    <span class="tooltip">Okçu Kulesi<br>Düşük hasar, hızlı atış</span>
                </button>
                <button id="buyTower2" class="buy-tower-btn relative bg-purple-500 hover:bg-purple-600 text-white py-2 px-4 rounded transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                    Büyücü (75)
                    <span class="tooltip">Büyücü Kulesi<br>Yüksek hasar, yavaş atış</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuOverlay = document.getElementById('menuOverlay');
        const gameUI = document.getElementById('gameUI');
        const baslaBtn = document.getElementById('baslaBtn');
        const menuTitle = document.getElementById('menuTitle');
        const menuMessage = document.getElementById('menuMessage');
        const uiHealth = document.getElementById('uiHealth');
        const uiScore = document.getElementById('uiScore');
        const uiMoney = document.getElementById('uiMoney');
        const uiWave = document.getElementById('uiWave');
        const buyTower1Btn = document.getElementById('buyTower1');
        const buyTower2Btn = document.getElementById('buyTower2');

        const COLORS = {
            BG_START: '#34495e', BG_END: '#2c3e50', PATH: '#95a5a6',
            TOWER_ARCHER_BASE: '#27ae60', TOWER_ARCHER_LVL2: '#2ecc71',
            TOWER_MAGE_BASE: '#8e44ad', TOWER_MAGE_LVL2: '#9b59b6',
            ENEMY: '#e74c3c', BULLET: '#ecf0f1', PARTICLE: '#f39c12',
            UI_TEXT: '#ecf0f1', UI_BTN_DISABLED: '#6c7a89', UI_SELECTION: '#f1c40f'
        };

        const TOWER_TYPES = {
            ARCHER: { id: 1, name: 'Okçu', cost: 50, color: COLORS.TOWER_ARCHER_BASE, range: 150, damage: 10, attackSpeed: 1, bulletSpeed: 200, levelUpMulti: 1.5, lvl2Color: COLORS.TOWER_ARCHER_LVL2 },
            MAGE: { id: 2, name: 'Büyücü', cost: 75, color: COLORS.TOWER_MAGE_BASE, range: 200, damage: 25, attackSpeed: 2, bulletSpeed: 150, levelUpMulti: 1.8, lvl2Color: COLORS.TOWER_MAGE_LVL2 }
        };

        const GRID_SIZE = 40;
        let gameState = 'menu';
        let health = 100, score = 0, money = 150, wave = 0;
        let towers = [], enemies = [], bullets = [], particles = [];
        let path = [];
        let towerPlacementGrid = []; // 2D array: 0=empty, 1=path, 2=tower
        let selectedTowerType = null;
        let lastTime = 0, deltaTime = 0;
        let pathOffset = { x: 0, y: 0 };
        let canvasWidth, canvasHeight;

        let waveConfig = [];
        let currentWaveIndex = 0;
        let enemiesToSpawnThisWave = 0;
        let enemiesSpawnedThisWave = 0;
        let enemySpawnTimer = 0;
        const ENEMY_SPAWN_INTERVAL = 0.8;

        window.OYUN_DURUMU = { asama: "menu", dalga: 0, can: 0, skor: 0 };

        // Helper: get distance between two points
        const dist = (p1, p2) => Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
        const normalize = (vec) => { let l = Math.sqrt(vec.x*vec.x + vec.y*vec.y); return l > 0 ? { x: vec.x/l, y: vec.y/l } : { x: 0, y: 0 }; };

        class Tower {
            constructor(x, y, type, level = 1) {
                this.x = x; this.y = y; this.type = type; this.level = level;
                this.range = type.range * (1 + (level - 1) * 0.2);
                this.damage = type.damage * (type.levelUpMulti**(level - 1));
                this.attackSpeed = type.attackSpeed / (1 + (level - 1) * 0.1);
                this.bulletSpeed = type.bulletSpeed;
                this.color = level === 1 ? type.color : type.lvl2Color;
                this.cooldown = 0; this.target = null; this.angle = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
                ctx.fillRect(-GRID_SIZE / 3, -GRID_SIZE / 3, GRID_SIZE * 2 / 3, GRID_SIZE * 2 / 3);
                ctx.shadowBlur = 0;
                ctx.fillStyle = COLORS.UI_TEXT;
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Lv${this.level}`, 0, GRID_SIZE / 2 + 5);
                ctx.restore();

                // Draw range
                // if (this === selectedTowerForUI) {
                //     ctx.beginPath();
                //     ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
                //     ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                //     ctx.stroke();
                // }
            }

            update(dt) {
                this.cooldown -= dt;
                this.findTarget();
                if (this.target && this.cooldown <= 0) {
                    this.shoot();
                    this.cooldown = this.attackSpeed;
                }
            }

            findTarget() {
                this.target = null;
                let closestDist = this.range * this.range;
                for (const enemy of enemies) {
                    const distance = dist(this, enemy);
                    if (distance < this.range && distance * distance < closestDist) {
                        this.target = enemy;
                        closestDist = distance * distance;
                    }
                }
                if (this.target) {
                    this.angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                }
            }

            shoot() {
                if (this.target && this.target.health > 0) {
                    bullets.push(new Bullet(this.x, this.y, this.target, this.damage, this.bulletSpeed, this.type.color));
                }
            }
        }

        class Enemy {
            constructor(health, speed, reward) {
                this.pathIndex = 0;
                this.x = path[0].x; this.y = path[0].y;
                this.health = health; this.maxHealth = health;
                this.speed = speed; this.reward = reward;
                this.radius = GRID_SIZE / 4;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = COLORS.ENEMY;
                ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Health bar
                ctx.fillStyle = 'red';
                ctx.fillRect(-this.radius, -this.radius - 8, this.radius * 2, 4);
                ctx.fillStyle = 'green';
                ctx.fillRect(-this.radius, -this.radius - 8, this.radius * 2 * (this.health / this.maxHealth), 4);
                ctx.restore();
            }

            update(dt) {
                if (this.pathIndex < path.length - 1) {
                    const target = path[this.pathIndex + 1];
                    const dx = target.x - this.x;
                    const dy = target.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < this.speed * dt) {
                        this.x = target.x;
                        this.y = target.y;
                        this.pathIndex++;
                    } else {
                        this.x += (dx / distance) * this.speed * dt;
                        this.y += (dy / distance) * this.speed * dt;
                    }
                } else {
                    health -= 1; // Enemy reached end
                    this.health = 0; // Mark for removal
                }
            }

            takeDamage(damage) {
                this.health -= damage;
                if (this.health <= 0) {
                    score += this.reward;
                    money += this.reward;
                    this.explode();
                }
            }

            explode() {
                for (let i = 0; i < 6; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 50 + 50;
                    particles.push(new Particle(this.x, this.y, Math.cos(angle) * speed, Math.sin(angle) * speed, COLORS.PARTICLE, 5, 0.5));
                }
            }
        }

        class Bullet {
            constructor(x, y, target, damage, speed, color) {
                this.x = x; this.y = y; this.target = target; this.damage = damage;
                this.speed = speed; this.color = color;
                this.radius = 3; this.life = 1; // Life in seconds
                this.trail = [];
            }

            draw() {
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const p = this.trail[i];
                    ctx.fillStyle = `rgba(${parseInt(this.color.slice(1,3),16)},${parseInt(this.color.slice(3,5),16)},${parseInt(this.color.slice(5,7),16)},${p.alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            update(dt) {
                if (!this.target || this.target.health <= 0) {
                    this.life = 0; return;
                }

                this.trail.push({ x: this.x, y: this.y, radius: this.radius * (0.5 + Math.random() * 0.5), alpha: 0.5 });
                if (this.trail.length > 5) this.trail.shift();

                const dx = this.target.x - this.x;
                const dy = this.target.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < this.speed * dt) {
                    this.x = this.target.x;
                    this.y = this.target.y;
                    this.target.takeDamage(this.damage);
                    this.life = 0; // Bullet hit target
                } else {
                    this.x += (dx / distance) * this.speed * dt;
                    this.y += (dy / distance) * this.speed * dt;
                    this.life -= dt; // Bullet expires if it misses
                }
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, size, life) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.color = color; this.size = size; this.life = life;
                this.gravity = 500;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += this.gravity * dt;
                this.life -= dt;
            }
        }

        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            generatePath();
            initTowerPlacementGrid();
        }

        function generatePath() {
            path = [];
            const gw = Math.floor(canvasWidth / GRID_SIZE);
            const gh = Math.floor(canvasHeight / GRID_SIZE);

            pathOffset = { x: (canvasWidth - gw * GRID_SIZE) / 2, y: (canvasHeight - gh * GRID_SIZE) / 2 };

            path.push({ x: -GRID_SIZE, y: Math.floor(gh / 2) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 }); // Start left
            path.push({ x: Math.floor(gw / 4) * GRID_SIZE + pathOffset.x + GRID_SIZE/2, y: Math.floor(gh / 2) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 });
            path.push({ x: Math.floor(gw / 4) * GRID_SIZE + pathOffset.x + GRID_SIZE/2, y: Math.floor(gh / 4) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 });
            path.push({ x: Math.floor(gw * 3 / 4) * GRID_SIZE + pathOffset.x + GRID_SIZE/2, y: Math.floor(gh / 4) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 });
            path.push({ x: Math.floor(gw * 3 / 4) * GRID_SIZE + pathOffset.x + GRID_SIZE/2, y: Math.floor(gh * 3 / 4) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 });
            path.push({ x: Math.floor(gw / 2) * GRID_SIZE + pathOffset.x + GRID_SIZE/2, y: Math.floor(gh * 3 / 4) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 });
            path.push({ x: Math.floor(gw / 2) * GRID_SIZE + pathOffset.x + GRID_SIZE/2, y: Math.floor(gh / 2) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 });
            path.push({ x: canvasWidth + GRID_SIZE, y: Math.floor(gh / 2) * GRID_SIZE + pathOffset.y + GRID_SIZE/2 }); // End right

            // Adjust path points to be grid centers
            for(let i=0; i<path.length; i++){
                path[i].x = Math.round((path[i].x - pathOffset.x) / GRID_SIZE) * GRID_SIZE + pathOffset.x + GRID_SIZE/2;
                path[i].y = Math.round((path[i].y - pathOffset.y) / GRID_SIZE) * GRID_SIZE + pathOffset.y + GRID_SIZE/2;
            }
        }

        function initTowerPlacementGrid() {
            const gw = Math.floor(canvasWidth / GRID_SIZE);
            const gh = Math.floor(canvasHeight / GRID_SIZE);
            towerPlacementGrid = Array(gw).fill(0).map(() => Array(gh).fill(0));

            // Mark path as occupied
            for (let i = 0; i < path.length - 1; i++) {
                let start = path[i];
                let end = path[i+1];
                let sx = Math.round((start.x - pathOffset.x - GRID_SIZE/2) / GRID_SIZE);
                let sy = Math.round((start.y - pathOffset.y - GRID_SIZE/2) / GRID_SIZE);
                let ex = Math.round((end.x - pathOffset.x - GRID_SIZE/2) / GRID_SIZE);
                let ey = Math.round((end.y - pathOffset.y - GRID_SIZE/2) / GRID_SIZE);

                for (let x = Math.min(sx, ex); x <= Math.max(sx, ex); x++) {
                    for (let y = Math.min(sy, ey); y <= Math.max(sy, ey); y++) {
                        if (x >= 0 && x < gw && y >= 0 && y < gh) {
                            towerPlacementGrid[x][y] = 1; // 1 means path
                        }
                    }
                }
            }
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
            gradient.addColorStop(0, COLORS.BG_START);
            gradient.addColorStop(1, COLORS.BG_END);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        }

        function drawPath() {
            ctx.strokeStyle = COLORS.PATH;
            ctx.lineWidth = GRID_SIZE / 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.stroke();
        }

        function drawGameUI() {
            uiHealth.textContent = health;
            uiScore.textContent = score;
            uiMoney.textContent = money;
            uiWave.textContent = wave;

            buyTower1Btn.disabled = money < TOWER_TYPES.ARCHER.cost;
            buyTower2Btn.disabled = money < TOWER_TYPES.MAGE.cost;

            document.querySelectorAll('.buy-tower-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (selectedTowerType && btn.id === `buyTower${selectedTowerType.id}`) {
                    btn.classList.add('selected');
                }
            });
        }

        function spawnWave() {
            if (enemiesSpawnedThisWave < enemiesToSpawnThisWave && enemySpawnTimer <= 0) {
                let baseEnemyHealth = 50 * (1.3 ** currentWaveIndex);
                enemies.push(new Enemy(baseEnemyHealth, 40 + currentWaveIndex * 5, 10 + currentWaveIndex * 2));
                enemiesSpawnedThisWave++;
                enemySpawnTimer = ENEMY_SPAWN_INTERVAL;
            }
            enemySpawnTimer -= deltaTime;
        }

        function nextWave() {
            currentWaveIndex++;
            if (currentWaveIndex >= waveConfig.length) {
                gameState = 'won';
                return;
            }
            wave = currentWaveIndex + 1;
            enemiesToSpawnThisWave = waveConfig[currentWaveIndex].count;
            enemiesSpawnedThisWave = 0;
            enemySpawnTimer = ENEMY_SPAWN_INTERVAL;
        }

        function initGame() {
            health = 100; score = 0; money = 150; wave = 1;
            towers = []; enemies = []; bullets = []; particles = [];
            selectedTowerType = null;
            currentWaveIndex = 0;
            enemiesToSpawnThisWave = 0;
            enemiesSpawnedThisWave = 0;
            enemySpawnTimer = 0;
            
            initTowerPlacementGrid();

            waveConfig = [
                { count: 10, healthMulti: 1 },
                { count: 12, healthMulti: 1.3 },
                { count: 15, healthMulti: 1.69 },
                { count: 18, healthMulti: 2.197 },
                { count: 20, healthMulti: 2.856 }
            ];
            
            enemiesToSpawnThisWave = waveConfig[currentWaveIndex].count;
            gameState = 'playing';
            menuOverlay.classList.add('hidden');
            gameUI.classList.remove('hidden');
        }

        function handleClick(event) {
            if (gameState !== 'playing') { return; }

            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (event.type === 'touchstart') {
                event.preventDefault(); // Prevent touch events from triggering mouse events
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            const x = (clientX - rect.left) / (rect.right - rect.left) * canvas.width;
            const y = (clientY - rect.top) / (rect.bottom - rect.top) * canvas.height;

            const gridX = Math.floor((x - pathOffset.x) / GRID_SIZE);
            const gridY = Math.floor((y - pathOffset.y) / GRID_SIZE);

            if (selectedTowerType) {
                if (gridX >= 0 && gridX < towerPlacementGrid.length && gridY >= 0 && gridY < towerPlacementGrid[0].length) {
                    if (towerPlacementGrid[gridX][gridY] === 0) { // Empty spot
                        let canPlace = false;
                        if (money >= selectedTowerType.cost) {
                            canPlace = true;
                            money -= selectedTowerType.cost;
                            let placedTower = new Tower(gridX * GRID_SIZE + pathOffset.x + GRID_SIZE/2, gridY * GRID_SIZE + pathOffset.y + GRID_SIZE/2, selectedTowerType);
                            towers.push(placedTower);
                            towerPlacementGrid[gridX][gridY] = placedTower; // Mark grid with tower object

                            // Check for merge
                            const dx = [-1, 0, 1, 0]; // 4 directions
                            const dy = [0, -1, 0, 1];
                            let merged = false;

                            for (let i = 0; i < 4; i++) {
                                const nx = gridX + dx[i];
                                const ny = gridY + dy[i];

                                if (nx >= 0 && nx < towerPlacementGrid.length && ny >= 0 && ny < towerPlacementGrid[0].length) {
                                    const neighbor = towerPlacementGrid[nx][ny];
                                    if (neighbor && neighbor !== 1 && neighbor.type === placedTower.type && neighbor.level === placedTower.level) {
                                        // Merge happens: new tower absorbs neighbor
                                        towers = towers.filter(t => t !== neighbor);
                                        towerPlacementGrid[nx][ny] = 0; // Clear old tower spot
                                        placedTower.level++;
                                        placedTower.range = placedTower.type.range * (1 + (placedTower.level - 1) * 0.2);
                                        placedTower.damage = placedTower.type.damage * (placedTower.type.levelUpMulti**(placedTower.level - 1));
                                        placedTower.attackSpeed = placedTower.type.attackSpeed / (1 + (placedTower.level - 1) * 0.1);
                                        placedTower.color = placedTower.level === 1 ? placedTower.type.color : placedTower.type.lvl2Color;
                                        merged = true;
                                        break; // Only one merge per placement for simplicity
                                    }
                                }
                            }
                        }
                        selectedTowerType = null; // Deselect after placement
                    }
                }
            }
        }

        function drawHoverPlacement() {
            if (selectedTowerType) {
                const mx = mousePos.x;
                const my = mousePos.y;
                const gridX = Math.floor((mx - pathOffset.x) / GRID_SIZE);
                const gridY = Math.floor((my - pathOffset.y) / GRID_SIZE);

                if (gridX >= 0 && gridX < towerPlacementGrid.length && gridY >= 0 && gridY < towerPlacementGrid[0].length) {
                    const gx = gridX * GRID_SIZE + pathOffset.x + GRID_SIZE/2;
                    const gy = gridY * GRID_SIZE + pathOffset.y + GRID_SIZE/2;

                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = towerPlacementGrid[gridX][gridY] === 0 ? selectedTowerType.color : COLORS.UI_BTN_DISABLED;
                    ctx.fillRect(gx - GRID_SIZE / 3, gy - GRID_SIZE / 3, GRID_SIZE * 2 / 3, GRID_SIZE * 2 / 3);
                    ctx.strokeStyle = COLORS.UI_SELECTION;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(gx - GRID_SIZE / 3, gy - GRID_SIZE / 3, GRID_SIZE * 2 / 3, GRID_SIZE * 2 / 3);

                    // Draw range preview
                    ctx.beginPath();
                    ctx.arc(gx, gy, selectedTowerType.range, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.stroke();

                    ctx.globalAlpha = 1;
                }
            }
        }

        let mousePos = { x: 0, y: 0 };
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = (e.clientX - rect.left) / (rect.right - rect.left) * canvas.width;
            mousePos.y = (e.clientY - rect.top) / (rect.bottom - rect.top) * canvas.height;
        });

        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            // Update OYUN_DURUMU
            window.OYUN_DURUMU.asama = gameState;
            window.OYUN_DURUMU.dalga = wave;
            window.OYUN_DURUMU.can = health;
            window.OYUN_DURUMU.skor = score;

            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            drawBackground();
            drawPath();

            if (gameState === 'playing') {
                spawnWave();

                enemies.forEach(e => e.update(deltaTime));
                enemies = enemies.filter(e => e.health > 0 && e.pathIndex < path.length);
                
                towers.forEach(t => t.update(deltaTime));
                bullets.forEach(b => b.update(deltaTime));
                bullets = bullets.filter(b => b.life > 0);
                particles.forEach(p => p.update(deltaTime));
                particles = particles.filter(p => p.life > 0);

                enemies.forEach(e => e.draw());
                towers.forEach(t => t.draw());
                bullets.forEach(b => b.draw());
                particles.forEach(p => p.draw());

                drawHoverPlacement(); // Draw ghost tower on mouse hover

                if (enemies.length === 0 && enemiesSpawnedThisWave === enemiesToSpawnThisWave) {
                    if (currentWaveIndex < waveConfig.length - 1) {
                        nextWave();
                        money += 50; // Bonus for clearing wave
                    } else {
                        gameState = 'won';
                    }
                }
                
                if (health <= 0) {
                    gameState = 'lost';
                }
                drawGameUI();

            } else if (gameState === 'menu') {
                menuOverlay.classList.remove('hidden');
                gameUI.classList.add('hidden');
                menuTitle.textContent = "Ortaçağ Savunması";
                menuMessage.textContent = "Kuleleri yerleştir, düşmanları durdur!";
                baslaBtn.textContent = "Oyunu Başlat";
            } else if (gameState === 'won') {
                menuOverlay.classList.remove('hidden');
                gameUI.classList.add('hidden');
                menuTitle.textContent = "KAZANDINIZ!";
                menuMessage.textContent = `Tebrikler! Toplam Skorunuz: ${score}`;
                baslaBtn.textContent = "Yeniden Başlat";
            } else if (gameState === 'lost') {
                menuOverlay.classList.remove('hidden');
                gameUI.classList.add('hidden');
                menuTitle.textContent = "OYUN BİTTİ!";
                menuMessage.textContent = `Canınız bitti. Skorunuz: ${score}`;
                baslaBtn.textContent = "Yeniden Başlat";
            }

            requestAnimationFrame(animate);
        }

        baslaBtn.addEventListener('click', () => {
            initGame();
        });

        buyTower1Btn.addEventListener('click', () => { selectedTowerType = TOWER_TYPES.ARCHER; });
        buyTower2Btn.addEventListener('click', () => { selectedTowerType = TOWER_TYPES.MAGE; });

        canvas.addEventListener('mousedown', handleClick);
        canvas.addEventListener('touchstart', handleClick, { passive: false });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate(0);
    </script>
</body>
</html>
